<!-- @dsCard group="Type" viewport="700x280" name="Type scale — Display to caption" subtitle="Noto Sans JP / system sans · 8-step scale" -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; color: var(--ink); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tok { font-size: 11px; color: var(--gray-400); width: 92px; flex: 0 0 92px; font-weight: 600; }
  .spec { color: var(--ink); }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="tok">display · 40/800</span><span class="spec" style="font-size:var(--fs-display);font-weight:800;letter-spacing:-1px">8件</span></div>
  <div class="row"><span class="tok">h1 · 26/800</span><span class="spec" style="font-size:var(--fs-h1);font-weight:800">申請を提出しました</span></div>
  <div class="row"><span class="tok">h2 · 22/700</span><span class="spec" style="font-size:var(--fs-h2);font-weight:700">どう進めますか？</span></div>
  <div class="row"><span class="tok">title · 19/700</span><span class="spec" style="font-size:var(--fs-title);font-weight:700">事業再構築補助金</span></div>
  <div class="row"><span class="tok">body-lg · 17/500</span><span class="spec" style="font-size:var(--fs-body-lg);font-weight:500">事業計画書を作成する</span></div>
  <div class="row"><span class="tok">body · 15/400</span><span class="spec" style="font-size:var(--fs-body)">会社のURLを入力すると、AIが診断します。</span></div>
  <div class="row"><span class="tok">label · 13/600</span><span class="spec" style="font-size:var(--fs-label);color:var(--gray-500);font-weight:600">会社のURL</span></div>
  <div class="row"><span class="tok">caption · 12/400</span><span class="spec" style="font-size:var(--fs-caption);color:var(--gray-500)">採択された場合のみのお支払いです。</span></div>
</div></body></html>
