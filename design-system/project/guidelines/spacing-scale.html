<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale — 4px base" subtitle="sp-1 … sp-10 step ramp" -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; color: var(--ink); }
  .wrap { padding: 22px 24px; display: flex; gap: 18px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--blue-200); border-radius: 3px; width: 100%; }
  .box { width: 46px; display: flex; flex-direction: column; align-items: center; }
  .tok { font-size: 11px; color: var(--gray-500); font-weight: 700; }
  .px { font-size: 10px; color: var(--gray-400); }
</style></head>
<body><div class="wrap">
  <div class="box"><div class="bar" style="height:4px"></div><div class="tok">1</div><div class="px">4</div></div>
  <div class="box"><div class="bar" style="height:8px"></div><div class="tok">2</div><div class="px">8</div></div>
  <div class="box"><div class="bar" style="height:12px"></div><div class="tok">3</div><div class="px">12</div></div>
  <div class="box"><div class="bar" style="height:16px"></div><div class="tok">4</div><div class="px">16</div></div>
  <div class="box"><div class="bar" style="height:20px"></div><div class="tok">5</div><div class="px">20</div></div>
  <div class="box"><div class="bar" style="height:24px"></div><div class="tok">6</div><div class="px">24</div></div>
  <div class="box"><div class="bar" style="height:32px"></div><div class="tok">8</div><div class="px">32</div></div>
  <div class="box"><div class="bar" style="height:40px"></div><div class="tok">10</div><div class="px">40</div></div>
</div></body></html>
