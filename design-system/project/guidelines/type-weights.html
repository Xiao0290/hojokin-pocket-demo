<!-- @dsCard group="Type" viewport="700x170" name="Weights & numerals" subtitle="400/500/700/800 · tabular hero figures" -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; color: var(--ink); }
  .wrap { padding: 22px 24px; display: flex; gap: 40px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .w { display: flex; align-items: baseline; gap: 12px; }
  .tok { font-size: 11px; color: var(--gray-400); width: 96px; font-weight: 600; }
  .num { font-size: 40px; font-weight: 800; letter-spacing: -1px; color: var(--blue-500); line-height: 1; }
  .num .u { font-size: 17px; font-weight: 700; }
</style></head>
<body><div class="wrap">
  <div class="col">
    <div class="w"><span class="tok">regular 400</span><span style="font-weight:400">補助金ポケット</span></div>
    <div class="w"><span class="tok">medium 500</span><span style="font-weight:500">補助金ポケット</span></div>
    <div class="w"><span class="tok">bold 700</span><span style="font-weight:700">補助金ポケット</span></div>
    <div class="w"><span class="tok">heavy 800</span><span style="font-weight:800">補助金ポケット</span></div>
  </div>
  <div class="col" style="align-items:center">
    <span class="num">68<span class="u">%</span></span>
    <span style="font-size:12px;color:var(--gray-500);font-weight:600">hero numeral — display/800</span>
  </div>
</div></body></html>
