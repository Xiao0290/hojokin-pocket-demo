<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Blue ramp" subtitle="Primary #1a56f0; 600 pressed; tints for surfaces" -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; }
  .chip { height: 52px; }
  .meta { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 700; color: var(--ink); }
  .hex { font-size: 10px; color: var(--gray-500); }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#eef3ff</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#dde7ff</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-200)"></div><div class="meta"><div class="name">200</div><div class="hex">#b9cdfd</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><div class="name">400</div><div class="hex">#4f7bf5</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">500 ●</div><div class="hex">#1a56f0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">600 ↓</div><div class="hex">#1546c8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#10369c</div></div></div>
</div></body></html>
