<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Ink & gray" subtitle="Text, hairlines and surface washes" -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; }
  .chip { height: 52px; }
  .meta { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 700; color: var(--ink); }
  .hex { font-size: 10px; color: var(--gray-500); }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">ink</div><div class="hex">#1a1a1a</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="meta"><div class="name">gray-700</div><div class="hex">#4a4a4f</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">gray-500</div><div class="hex">#8a8a8e</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="meta"><div class="name">gray-400</div><div class="hex">#a8a8ad</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="meta"><div class="name">gray-300</div><div class="hex">#cfcfd6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--line)"></div><div class="meta"><div class="name">line</div><div class="hex">#e6e6ea</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-subtle);border-bottom:1px solid var(--line)"></div><div class="meta"><div class="name">subtle</div><div class="hex">#f7f8fa</div></div></div>
</div></body></html>
