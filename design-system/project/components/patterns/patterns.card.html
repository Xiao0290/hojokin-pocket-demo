<!doctype html>
<html lang="ja"><head><meta charset="utf-8">

<style>
  body { margin: 0; font-family: var(--font); background: #fff; color: var(--ink); }
  .stage { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px 28px; max-width: 640px; }
  .lbl { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-bottom: 8px; }
  .col { display: flex; flex-direction: column; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body><div id="root" class="stage"></div>
<script type="text/babel">
  const { SubsidyRow, Timeline, ChatBubble } = window.DesignSystem_a96fc8
  function Demo() {
    return (
      <>
        <div className="col" style={{ gridColumn: '1 / -1' }}>
          <div className="lbl">SubsidyRow</div>
          <SubsidyRow name="事業再構築補助金" frame="成長枠" meta={[{label:'上限',value:'¥30,000,000'},{label:'採択率',value:'68%'},{label:'残',value:'62日'}]} />
          <SubsidyRow name="ものづくり補助金" frame="製品・サービス高付加価値化枠" meta={[{label:'上限',value:'¥10,000,000'},{label:'採択率',value:'72%'},{label:'残',value:'48日'}]} />
        </div>
        <div className="col">
          <div className="lbl">Timeline</div>
          <Timeline items={[
            { title: '補助金を診断', sub: '8件マッチ', state: 'done' },
            { title: '申請書を作成', sub: 'AIが事業計画書を作成', state: 'done' },
            { title: '申請を提出', sub: '提出の準備ができました', state: 'active' },
            { title: '採択結果を待つ', state: 'todo' },
          ]} />
        </div>
        <div className="col">
          <div className="lbl">ChatBubble</div>
          <ChatBubble variant="system">事業計画書を共有しました</ChatBubble>
          <ChatBubble from="me">ドラフトができました。ご確認お願いします。</ChatBubble>
          <ChatBubble from="them">承知しました。加点につながる箇所を調整しますね。</ChatBubble>
        </div>
      </>
    )
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />)
</script>
