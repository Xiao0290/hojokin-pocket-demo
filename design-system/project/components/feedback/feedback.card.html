<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font); background: #fff; color: var(--ink); }
  .stage { padding: 24px; display: grid; grid-template-columns: 160px 1fr; gap: 22px 28px; align-items: center; max-width: 560px; }
  .lbl { font-size: 12px; color: var(--gray-500); font-weight: 600; grid-column: 1 / -1; margin-bottom: -10px; }
  .empty-box { border: 1px solid var(--line); border-radius: 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body><div id="root" class="stage"></div>
<script type="text/babel">
  const { Spinner, ProgressBar, EmptyState } = window.DesignSystem_a96fc8
  function Demo() {
    return (
      <>
        <div className="lbl">Spinner</div>
        <Spinner />
        <div style={{ color: 'var(--gray-500)', fontSize: 14 }}>会社情報を解析しています</div>
        <div className="lbl">ProgressBar</div>
        <ProgressBar value={80} />
        <div style={{ color: 'var(--gray-500)', fontSize: 14 }}>80% — 2,847制度と照合</div>
        <div className="lbl">EmptyState</div>
        <div className="empty-box" style={{ gridColumn: '1 / -1' }}>
          <EmptyState title="メッセージはありません" hint="専門家に依頼するとここに表示されます" />
        </div>
      </>
    )
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />)
</script>
</body></html>
