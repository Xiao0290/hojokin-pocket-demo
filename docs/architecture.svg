<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 566" width="680" height="566">
<style>
  text { font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; }
  .t   { font-size:14px; fill:#1a1a1a; }
  .ts  { font-size:12px; fill:#8a8a8e; }
  .th  { font-size:14px; font-weight:500; fill:#1a1a1a; }
  .title { font-size:16px; font-weight:700; fill:#1a1a1a; }
  .rect-blue { fill:#eef3ff; stroke:#1a56f0; stroke-width:1; }
  .rect-teal { fill:#e8f6f1; stroke:#15a673; stroke-width:1; }
  .rect-gray { fill:#f3f4f6; stroke:#a8a8ad; stroke-width:1; stroke-dasharray:4 4; }
  .region    { fill:none;    stroke:#cfcfd6; stroke-width:1; stroke-dasharray:4 4; }
  .arr { stroke:#8a8a8e; stroke-width:1.5; fill:none; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8a8e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="566" fill="#ffffff"/>

<text class="title" x="40" y="26">補助金ポケット — Phase 1 MVP システム構成</text>

<!-- legend -->
<rect x="40" y="40" width="12" height="12" rx="3" fill="#1a56f0"/>
<text class="ts" x="58" y="50">自社実装（MVP）</text>
<rect x="190" y="40" width="12" height="12" rx="3" fill="#15a673"/>
<text class="ts" x="208" y="50">外部サービス（Buy）</text>
<rect x="372" y="40" width="12" height="12" rx="3" fill="none" stroke="#a8a8ad" stroke-dasharray="3 3"/>
