<text class="ts" x="485" y="100" text-anchor="middle">Next.js · Phase 2</text>

<line class="arr" x1="195" y1="108" x2="195" y2="130" marker-end="url(#arrow)"/>
<line class="arr" x1="485" y1="108" x2="485" y2="130" marker-end="url(#arrow)" stroke-dasharray="4 4"/>

